# General
spring.application.name=sandbox
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}
server.servlet.contextPath=/api

# Logs
logging.level.org.apache.kafka=ERROR
logging.level.kafka=ERROR
logging.level.org.springframework.kafka=ERROR

# Localstack
spring.config.import=\
  aws-secretsmanager:/my-secret/test-1?prefix=testA.,\
  aws-secretsmanager:/my-secret/test-2?prefix=testB.

spring.cloud.aws.secretsmanager.enabled=true
spring.cloud.aws.secretsmanager.region=eu-central-1
spring.cloud.aws.endpoint=http://${LOCALSTACK_HOST:localhost}:4566

spring.cloud.aws.credentials.access-key=${LOCALSTACK_LOGIN}
spring.cloud.aws.credentials.secret-key=${LOCALSTACK_PASSWORD}

localstack.my-test-1=${testA.username}
localstack.my-test-2=${testB.username}

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:}

# H2 Database
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.ddl-auto=none

spring.h2.console.enabled=true
spring.h2.console.settings.web-allow-others=true
spring.h2.console.path=/h2-console


# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}
spring.kafka.consumer.group-id=sandbox-group
spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

## Custom topic configuration
kafka.topic.name=test-topic
kafka.topic.partitions=${KAFKA_TOPIC_PARTITIONS}
kafka.replication.factor=${KAFKA_REPLICATION_FACTOR}


# Mail service
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USER}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
